pageDescription: >-
  Specialist consultancy in intellectual disability, helping organisations
  deliver rights-based, person-centred, high-quality services.
bio1: >
  I’m Michelle Carter, a CORU‑registered Social Care Worker and the founder of
  Michelle Carter Consultancy. I’ve spent over 26 years working across frontline
  practice, leadership, research, regulation, and service development in
  intellectual disability and social care — and throughout that time, one thing
  has stayed constant: my commitment to supporting people to live full,
  meaningful, self‑directed lives.
bio2: >
  I started my career on the frontline, later stepping into Person in Charge
  roles where I led teams, built positive cultures, and championed rights‑based,
  person‑centred supports. Those years shaped how I work today. They taught me
  that good services begin with listening — really listening — to people’s
  stories, their will and preferences, and what matters most in their everyday
  lives.
bio3: >-
  My work now focuses on the areas I care deeply about:

  Ageing with intellectual disability — helping services understand ageing
  trajectories and support people to age well, with dignity and choice.


  Rights‑based and person‑centred practice — promoting approaches that honour
  autonomy, voice, and meaningful participation.


  Training and consultancy — designing practical, engaging programmes that build
  confidence, strengthen culture, and support staff to deliver high‑quality,
  rights‑focused practice.


  Service review and quality improvement — working alongside organisations to
  enhance safety, quality, and lived‑experience‑informed decision‑making.


  I also contribute nationally to professional standards and rights‑based
  decision‑making. I serve on CORU assessment and review teams, supporting
  fitness‑to‑practise processes and the evaluation of social care education
  programmes. I’m also a Decision‑Making Representative Panel Member with the
  Decision Support Service, supporting people to exercise their rights under the
  Assisted Decision‑Making (Capacity) Act.


  Across all my work — whether I’m delivering training, reviewing services, or
  contributing to national standards — my focus is the same: strengthening
  quality, safeguarding rights, and amplifying the voices of those most
  impacted.
qualifications:
  - QQI Level 6 Training Delivery & Evaluation
  - Safeguarding of Vulnerable Adults Trainer
  - >-
    MSc Ageing Health and Wellbeing in Intellectual Disability Trinity College
    Dublin
values:
  - title: Rights Based Practice
    description: >-
      We champion the rights, dignity, and autonomy of every person, ensuring
      that all training and consultancy work is grounded in human rights
      principles and aligned with national and international standards.
  - title: Person Centred Culture
    description: >-
      We believe that high‑quality services start with truly listening to
      people. Our work supports organisations to embed person‑centred thinking,
      culture, and practice at every level.
  - title: Quality and Professional Integrity
    description: >-
      We are committed to evidence‑informed practice, ethical decision‑making,
      and delivering work that meets the highest professional and regulatory
      standards.
  - title: Collaboration & Partnership
    description: >-
      We work alongside organisations, teams, and people with lived experience
      to co‑create meaningful, practical solutions that strengthen services and
      support positive outcomes.
  - title: Learning & Reflective Practice
    description: >
      We promote continuous learning, reflective practice, and professional
      growth—helping teams build confidence, competence, and a shared
      understanding of best practice.
  - title: Safeguarding & Accountability
    description: >-
      We prioritise safety, transparency, and accountability in all aspects of
      our work, supporting services to uphold safeguarding responsibilities and
      maintain strong governance.
  - title: Practical, Real‑World Impact
    description: >-
      We focus on training and consultancy that is accessible, relevant, and
      immediately applicable—ensuring that learning translates into real
      improvements in everyday practice.
