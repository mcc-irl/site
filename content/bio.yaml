bio1: Michelle has spent over 15 years working across clinical practice, staff development, and healthcare education. Her work focuses on translating policy and standards into practical day-to-day actions for frontline teams.
bio2: She partners with residential care, community services, and healthcare providers to design engaging training programmes that improve confidence, competence, and consistency in care delivery.
bio3: Through Michelle Carter Consultancy, she delivers tailored education and quality-focused consultancy that helps organisations strengthen governance, support staff, and improve outcomes for the people they serve.
qualifications:
  - Registered Nurse (RGN)
  - QQI Level 6 Training Delivery & Evaluation
  - Patient Moving & Handling Instructor Certification
  - Manual Handling Instructor Certification
  - Infection Prevention and Control Trainer
  - Safeguarding of Vulnerable Adults Trainer
values:
  - title: Practical Excellence
    description: Training is designed to be clear, hands-on, and directly relevant to real care environments.
  - title: Compassionate Leadership
    description: Teams are supported to build confidence, communicate effectively, and lead with empathy.
  - title: Sustainable Quality
    description: Every programme aims to embed long-term improvements in safety, standards, and outcomes.
