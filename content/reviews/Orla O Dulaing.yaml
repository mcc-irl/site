quote: >-
  I wanted to share some quick feedback on the training led by Michelle Carter
  about positive aging in people with ID. I found the session incredibly
  informative and thought-provoking. Michelle presented the material in a really
  engaging and practical way, and I left with several useful insights that feel
  highly relevant to our day-to-day support work, as I’m sure others did too.
  She also provided documents and tools that promote good practice in planning
  for aging. With that in mind, I’d suggest this training and the materials
  shared could be valuable to roll out more widely to all staff. I understand
  there are many priorities to juggle, but I think this could really enhance how
  we support individuals as they age.
